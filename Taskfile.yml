# Taskfile.yml - repo-local execution menu for OpenClaw voice wrapper work.
version: '3'

tasks:
  check:
    desc: Run safe local project checks.
    cmds:
      - task: policy:validate
      - task: schema:validate
      - task: eval:intents
      - task: test:browser

  policy:validate:
    desc: Validate local policy templates when validators exist.
    cmds:
      - python3 tests/policy/validate_policy.py policies/openclaw.exec-approvals.template.json policies/windows-node.exec-policy.template.json || python tests/policy/validate_policy.py policies/openclaw.exec-approvals.template.json policies/windows-node.exec-policy.template.json

  schema:validate:
    desc: Validate local JSON schema guards.
    cmds:
      - python3 tests/policy/validate_schemas.py schemas/approval-request.schema.json schemas/openclaw-action-request.schema.json || python tests/policy/validate_schemas.py schemas/approval-request.schema.json schemas/openclaw-action-request.schema.json

  eval:intents:
    desc: Run voice intent and risk evals when promptfoo config exists.
    cmds:
      - 'echo "eval:intents skeleton ready at evals/promptfooconfig.yaml; install promptfoo before running real evals"'

  test:browser:
    desc: Run browser permission smoke tests when Playwright tests exist.
    cmds:
      - 'echo "test:browser skeleton ready at tests/browser/browser-permissions.spec.ts; install Playwright before running real browser tests"'

  approval:queue:
    desc: Print pending external approval requests.
    cmds:
      - python3 scripts/wsl/approval_queue.py queue || python scripts/wsl/approval_queue.py queue

  approval:status:
    desc: Print approval queue status counts.
    cmds:
      - python3 scripts/wsl/approval_queue.py status || python scripts/wsl/approval_queue.py status

  e2e:dry-run:
    desc: Preview text intent routing without executing actions.
    cmds:
      - 'python3 scripts/wsl/e2e_dry_run.py --intent "{{.INTENT | default ""}}" || python scripts/wsl/e2e_dry_run.py --intent "{{.INTENT | default ""}}"'

  voice:dry-run:
    desc: Preview voice utterance routing without executing actions.
    cmds:
      - 'python3 scripts/wsl/voice_dry_run.py --utterance "{{.INTENT | default ""}}" || python scripts/wsl/voice_dry_run.py --utterance "{{.INTENT | default ""}}"'

  debug:once:
    desc: Run one read-only debug monitor pass.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_monitor.py --once'"

  debug:monitor:
    desc: Run the read-only debug monitor loop and append ignored JSONL logs.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_monitor.py --watch --interval {{.INTERVAL | default 30}} --iterations {{.ITERATIONS | default 0}}'"

  browser:doctor:
    desc: Print browser lane doctor command without touching host settings.
    cmds:
      - 'echo "manual later: openclaw browser status && openclaw browser doctor --deep"'

  openclaw:doctor:
    desc: Print OpenClaw doctor command without touching host settings.
    cmds:
      - 'echo "manual later: openclaw doctor && openclaw gateway status"'
