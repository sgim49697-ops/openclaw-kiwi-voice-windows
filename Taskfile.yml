# Taskfile.yml - repo-local execution menu for OpenClaw voice wrapper work.
version: '3'

tasks:
  check:
    desc: Run safe local project checks.
    cmds:
      - task: policy:validate
      - task: schema:validate
      - task: eval:intents
      - task: test:browser

  policy:validate:
    desc: Validate local policy templates when validators exist.
    cmds:
      - python3 tests/policy/validate_policy.py policies/openclaw.exec-approvals.template.json policies/windows-node.exec-policy.template.json || python tests/policy/validate_policy.py policies/openclaw.exec-approvals.template.json policies/windows-node.exec-policy.template.json

  schema:validate:
    desc: Validate local JSON schema guards.
    cmds:
      - python3 tests/policy/validate_schemas.py schemas/approval-request.schema.json schemas/openclaw-action-request.schema.json schemas/voice-planner-output.schema.json || python tests/policy/validate_schemas.py schemas/approval-request.schema.json schemas/openclaw-action-request.schema.json schemas/voice-planner-output.schema.json

  eval:intents:
    desc: Run voice intent and risk evals when promptfoo config exists.
    cmds:
      - 'echo "eval:intents skeleton ready at evals/promptfooconfig.yaml and evals/voice-planner-cases.yaml; install promptfoo before running real evals"'

  test:browser:
    desc: Run browser permission smoke tests when Playwright tests exist.
    cmds:
      - 'echo "test:browser skeleton ready at tests/browser/browser-permissions.spec.ts; install Playwright before running real browser tests"'

  browser:probe:
    desc: Run read-only browser lane probe and append ignored JSONL logs.
    cmds:
      - python3 scripts/wsl/browser_probe.py || python scripts/wsl/browser_probe.py

  browser:interact-probe:
    desc: Run safe browser interact smoke against the isolated OpenClaw profile.
    cmds:
      - python3 scripts/wsl/browser_interact_probe.py || python scripts/wsl/browser_interact_probe.py

  browser:cdp-recovery:
    desc: Recover isolated OpenClaw browser CDP page-level stalls.
    cmds:
      - python3 scripts/wsl/browser_cdp_recovery.py || python scripts/wsl/browser_cdp_recovery.py

  approval:queue:
    desc: Print pending external approval requests.
    cmds:
      - python3 scripts/wsl/approval_queue.py queue || python scripts/wsl/approval_queue.py queue

  approval:status:
    desc: Print approval queue status counts.
    cmds:
      - python3 scripts/wsl/approval_queue.py status || python scripts/wsl/approval_queue.py status

  approval:show:
    desc: Print one approval request JSON.
    cmds:
      - 'python3 scripts/wsl/approval_queue.py show --request-id "{{.REQUEST_ID | default ""}}" || python scripts/wsl/approval_queue.py show --request-id "{{.REQUEST_ID | default ""}}"'

  approval:approve:
    desc: Manually approve one pending request with explicit owner confirmation.
    cmds:
      - 'python3 scripts/wsl/approval_queue.py approve --request-id "{{.REQUEST_ID | default ""}}" --method manual --approved-by owner --confirm-request-id "{{.REQUEST_ID | default ""}}" || python scripts/wsl/approval_queue.py approve --request-id "{{.REQUEST_ID | default ""}}" --method manual --approved-by owner --confirm-request-id "{{.REQUEST_ID | default ""}}"'

  approval:reject:
    desc: Manually reject one pending request with explicit owner confirmation.
    cmds:
      - 'python3 scripts/wsl/approval_queue.py reject --request-id "{{.REQUEST_ID | default ""}}" --method manual --rejected-by owner --confirm-request-id "{{.REQUEST_ID | default ""}}" || python scripts/wsl/approval_queue.py reject --request-id "{{.REQUEST_ID | default ""}}" --method manual --rejected-by owner --confirm-request-id "{{.REQUEST_ID | default ""}}"'

  telegram:approval-fixture:
    desc: Simulate a Telegram approval callback for one pending request.
    cmds:
      - 'python3 scripts/wsl/telegram_approval.py probe-fixture --request-id "{{.REQUEST_ID | default ""}}" --decision "{{.DECISION | default "approve"}}" || python scripts/wsl/telegram_approval.py probe-fixture --request-id "{{.REQUEST_ID | default ""}}" --decision "{{.DECISION | default "approve"}}"'

  telegram:send-pending:
    desc: Send one pending approval request to Telegram when local secrets are configured.
    cmds:
      - 'python3 scripts/wsl/telegram_approval.py send-pending --request-id "{{.REQUEST_ID | default ""}}" || python scripts/wsl/telegram_approval.py send-pending --request-id "{{.REQUEST_ID | default ""}}"'

  telegram:poll-once:
    desc: Poll Telegram once and handle one approval callback.
    cmds:
      - python3 scripts/wsl/telegram_approval.py poll-once || python scripts/wsl/telegram_approval.py poll-once

  e2e:dry-run:
    desc: Preview text intent routing without executing actions.
    cmds:
      - 'python3 scripts/wsl/e2e_dry_run.py --intent "{{.INTENT | default ""}}" || python scripts/wsl/e2e_dry_run.py --intent "{{.INTENT | default ""}}"'

  e2e:approved-run:
    desc: Run one externally approved E2E request by request id.
    cmds:
      - 'python3 scripts/wsl/e2e_approved_runner.py --request-id "{{.REQUEST_ID | default ""}}" || python scripts/wsl/e2e_approved_runner.py --request-id "{{.REQUEST_ID | default ""}}"'

  e2e:approved-run-all:
    desc: Run all externally approved E2E requests.
    cmds:
      - python3 scripts/wsl/e2e_approved_runner.py --all || python scripts/wsl/e2e_approved_runner.py --all

  voice:dry-run:
    desc: Preview voice utterance routing without executing actions.
    cmds:
      - 'python3 scripts/wsl/voice_dry_run.py --utterance "{{.INTENT | default ""}}" || python scripts/wsl/voice_dry_run.py --utterance "{{.INTENT | default ""}}"'

  voice:planner:
    desc: Preview one transcript through the Codex OAuth voice planner.
    cmds:
      - 'python3 scripts/wsl/voice_planner.py --transcript "{{.TRANSCRIPT | default ""}}" || python scripts/wsl/voice_planner.py --transcript "{{.TRANSCRIPT | default ""}}"'

  voice:planner-probe:
    desc: Verify the Codex OAuth voice planner contract cases.
    cmds:
      - python3 scripts/wsl/voice_planner_probe.py || python scripts/wsl/voice_planner_probe.py

  voice:e2e-probe:
    desc: Verify v7 voice dry-run routing contract without executing actions.
    cmds:
      - python3 scripts/wsl/voice_e2e_probe.py || python scripts/wsl/voice_e2e_probe.py

  kiwi:windows-probe:
    desc: Inspect Windows Kiwi Voice readiness without mutating host state.
    cmds:
      - python3 scripts/wsl/kiwi_windows_probe.py || python scripts/wsl/kiwi_windows_probe.py

  kiwi:transcript-dry-run:
    desc: Preview routing for a Kiwi STT transcript without executing actions.
    cmds:
      - 'python3 scripts/wsl/kiwi_transcript_dry_run.py --transcript "{{.TRANSCRIPT | default ""}}" || python scripts/wsl/kiwi_transcript_dry_run.py --transcript "{{.TRANSCRIPT | default ""}}"'

  kiwi:live-dry-run-probe:
    desc: Verify the Windows Kiwi OpenClaw shim routes live transcripts to dry-run only.
    cmds:
      - python3 scripts/wsl/kiwi_live_dry_run_probe.py || python scripts/wsl/kiwi_live_dry_run_probe.py

  kiwi:live-approval-bridge:
    desc: Promote a safe new Kiwi live notify dry-run preview into the pending approval queue.
    cmds:
      - python3 scripts/wsl/kiwi_live_approval_bridge.py wait-write || python scripts/wsl/kiwi_live_approval_bridge.py wait-write

  kiwi:live-browser-read-approval-bridge:
    desc: Promote a safe new Kiwi live browser_read docs.openclaw.ai preview into the pending approval queue.
    cmds:
      - python3 scripts/wsl/kiwi_live_approval_bridge.py wait-write --action browser_read --risk-tier low --transcript-contains docs.openclaw.ai --expected-profile windows-cdp --expected-url https://docs.openclaw.ai || python scripts/wsl/kiwi_live_approval_bridge.py wait-write --action browser_read --risk-tier low --transcript-contains docs.openclaw.ai --expected-profile windows-cdp --expected-url https://docs.openclaw.ai

  kiwi:runtime-capture:
    desc: Restart Windows Kiwi with stdout/stderr captured to ignored artifacts.
    cmds:
      - python3 scripts/wsl/kiwi_runtime_capture.py start || python scripts/wsl/kiwi_runtime_capture.py start

  kiwi:runtime-tail:
    desc: Print filtered Kiwi runtime log lines from the latest capture artifact.
    cmds:
      - python3 scripts/wsl/kiwi_runtime_capture.py tail || python scripts/wsl/kiwi_runtime_capture.py tail

  kiwi:audio-ws-probe:
    desc: Send silence/tone PCM to Kiwi WebAudioBridge without executing actions.
    cmds:
      - node scripts/wsl/kiwi_audio_ws_probe.mjs

  kiwi:mic-level-probe:
    desc: Measure dashboard browser microphone RMS/peak through CDP.
    cmds:
      - node scripts/wsl/kiwi_browser_mic_level_probe.mjs

  kiwi:browser-mic-scan:
    desc: Rank browser microphone inputs through the Kiwi dashboard CDP tab.
    cmds:
      - node scripts/wsl/kiwi_browser_mic_level_probe.mjs --scan-inputs --per-device-ms {{.PER_DEVICE_MS | default 3000}} --min-rms {{.MIN_RMS | default 0.015}}

  kiwi:windows-audio-probe:
    desc: Measure Windows native microphone RMS through the Kiwi venv.
    cmds:
      - python3 scripts/wsl/kiwi_windows_audio_probe.py || python scripts/wsl/kiwi_windows_audio_probe.py

  kiwi:windows-audio-scan:
    desc: Rank Windows native microphone inputs through the Kiwi venv.
    cmds:
      - python3 scripts/wsl/kiwi_windows_audio_probe.py --scan-all --per-device-ms {{.PER_DEVICE_MS | default 3000}} --min-rms {{.MIN_RMS | default 0.015}} || python scripts/wsl/kiwi_windows_audio_probe.py --scan-all --per-device-ms {{.PER_DEVICE_MS | default 3000}} --min-rms {{.MIN_RMS | default 0.015}}

  kiwi:stt-capture:
    desc: Capture ignored Windows microphone WAV samples for local STT comparison.
    cmds:
      - python3 scripts/wsl/kiwi_stt_capture_probe.py --count {{.COUNT | default 3}} --duration-ms {{.DURATION_MS | default 6000}} || python scripts/wsl/kiwi_stt_capture_probe.py --count {{.COUNT | default 3}} --duration-ms {{.DURATION_MS | default 6000}}

  kiwi:browser-stt-capture:
    desc: Capture ignored dashboard browser microphone WAV samples through CDP.
    cmds:
      - node scripts/wsl/kiwi_browser_stt_capture_probe.mjs --count {{.COUNT | default 3}} --duration-ms {{.DURATION_MS | default 6000}}

  kiwi:stt-eval:
    desc: Compare local faster-whisper candidates on captured Kiwi WAV samples.
    cmds:
      - python3 scripts/wsl/kiwi_stt_eval_probe.py || python scripts/wsl/kiwi_stt_eval_probe.py

  kiwi:two-step-stt-gate:
    desc: Run the wake-only then command STT dry-run gate.
    cmds:
      - python3 scripts/wsl/kiwi_two_step_stt_gate.py || python scripts/wsl/kiwi_two_step_stt_gate.py

  kiwi:command-stt-gate:
    desc: Run the v7.2.14 fresh command-only STT dry-run gate.
    cmds:
      - python3 scripts/wsl/kiwi_command_stt_gate.py || python scripts/wsl/kiwi_command_stt_gate.py

  debug:once:
    desc: Run one read-only debug monitor pass.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_monitor.py --once'"

  debug:monitor:
    desc: Run the read-only debug monitor loop and append ignored JSONL logs.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_monitor.py --watch --interval {{.INTERVAL | default 30}} --iterations {{.ITERATIONS | default 0}}'"

  debug:autoloop:
    desc: Run the self-discovering safe debug loop.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_autoloop.py --watch --interval {{.INTERVAL | default 60}} --iterations {{.ITERATIONS | default 0}}'"

  debug:auto-once:
    desc: Run one self-discovering safe debug loop cycle.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_autoloop.py --once'"

  debug:agent:
    desc: Run the supervised L2 debug repair loop.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_agent.py --watch --interval {{.INTERVAL | default 60}} --iterations {{.ITERATIONS | default 0}}'"

  debug:agent-once:
    desc: Run one supervised L2 debug repair cycle.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_agent.py --once'"

  debug:forever:
    desc: Run supervised debug cycles until STOP file or Ctrl+C.
    cmds:
      - powershell.exe -NoProfile -Command "wsl -e bash -lc 'cd /home/user/projects/openclaw-kiwi-voice-windows && python3 scripts/wsl/debug_forever.py --watch --interval {{.INTERVAL | default 60}} --iterations {{.ITERATIONS | default 0}}'"

  debug:stop:
    desc: Request the debug forever loop to stop after the current cycle.
    cmds:
      - python3 scripts/wsl/debug_forever.py --stop || python scripts/wsl/debug_forever.py --stop

  debug:forever-status:
    desc: Print the latest debug forever summary.
    cmds:
      - python3 scripts/wsl/debug_forever.py --status || python scripts/wsl/debug_forever.py --status

  debug:forever-clear-stop:
    desc: Clear the debug forever STOP file.
    cmds:
      - python3 scripts/wsl/debug_forever.py --clear-stop || python scripts/wsl/debug_forever.py --clear-stop

  browser:doctor:
    desc: Print browser lane doctor command without touching host settings.
    cmds:
      - 'echo "manual later: openclaw browser status && openclaw browser doctor --deep"'

  openclaw:doctor:
    desc: Print OpenClaw doctor command without touching host settings.
    cmds:
      - 'echo "manual later: openclaw doctor && openclaw gateway status"'
