# voice-intents.yaml - sample safe and medium voice intents for future evals.
intents:
  - id: browser_read_docs
    utterance: "오픈클로, 크롬에서 example.com 열어줘"
    expected_lane: browser
    expected_risk: low
    expected_action: browser_read
    expected_approval: none

  - id: browser_search_interact
    utterance: "오픈클로, 검색창에 OpenClaw Windows Node 입력하고 결과를 열어줘"
    expected_lane: browser
    expected_risk: medium
    expected_action: browser_interact
    expected_approval: none

  - id: codex_readonly_plan
    utterance: "오픈클로, Codex로 현재 프로젝트 다음 계획 세워줘"
    expected_lane: windows_wrapper
    expected_action: open_vscode_codex_plan
    expected_risk: medium
    expected_approval: telegram_or_manual

  - id: notify_smoke
    utterance: "오픈클로, 테스트 알림 보내줘"
    expected_lane: windows_wrapper
    expected_action: notify
    expected_risk: low
    expected_approval: telegram_or_manual

  - id: cancel_control
    utterance: "취소"
    expected_lane: control
    expected_action: cancel
    expected_risk: low
    expected_approval: none
